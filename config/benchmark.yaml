# Unified benchmark configuration example.
# Copy this file to benchmark.yaml and customize values.
# Copy "main" from config/config.yaml (or config.example.yaml) for engine parity; keep mode: backtest.
# Under main.output_layout set only benchmark_subdir (root/backtest/live come from config.yaml).

main:
  mode: backtest

  # Fixed UTC offset (0, +8, -5) or IANA name; quote "+8" in YAML if needed.
  timezone: "0"
  start_date: '2026-03-09'
  end_date: '2026-03-13'

  primary_interval: 30m

  margin_requirement: 0.0

  sync_from_exchange: false

  initial_positions:
    cash: 100000.0
    positions:
      BTCUSDT:
        long: 0.0
        short: 0.0
      ETHUSDT:
        long: 0.0
        short: 0.0

  show_reasoning: true
  show_agent_graph: true

  print_frequency: 1
  use_progress_bar: true
  enable_logging: true
  save_decision_history: true

  output_layout:
    benchmark_subdir: benchmark

  auto_cleanup_files: false
  file_retention_days: 30
  file_keep_latest: 10

  # Same schema as config.example.yaml "risk" (optional; defaults apply if omitted).
  risk:
    risk_per_trade_pct: 0.02
    stop_loss_pct: 0.05
    min_quantity: 0.001
    quantity_decimals: 3
    stop_distance_mode: atr
    atr_period: 14
    atr_multiplier: 1.0
    max_notional_fraction_per_ticker: 1.0

  signals:
    intervals:
      - 1h
      - 4h
      - 5m
    tickers:
      - BTCUSDT
      - ETHUSDT
    strategies:
      - MacdStrategy
      - RSIStrategy
      - BollingerStrategy
  model:
    # Change based on your provider/API keys.
    name: "deepseek-chat"
    provider: "openai"
    base_url: "https://api.deepseek.com/v1"
    temperature: 0.0
    format: "json"

phase1:
  # Edit paths, dates, and experiment lists before running.

  # List comparison DAG runs only (reference full DAG is auto-prepended; do not list FullDAG).
  # [] = reference plus all single-strategy variants.
  dag_print_frequency: 1
  dag_use_progress_bar: true

  include_dag_experiments:
    - SingleMACD
    - SingleBollinger
    - SingleRSI
  export_individual_results: true
  export_charts: true

  # Optional: set output_dir to override the default (config.yaml root + benchmark_subdir).

phase2:
  # [] = reference plus all ablations. Non-empty = only those Ablate_* names (FullDAG auto-prepended).
  # Ablation benchmark (full DAG vs removing one subsystem at a time).
  dag_print_frequency: 1
  dag_use_progress_bar: true
  # Ablate_MultiInterval, Ablate_LLMPortfolio, Ablate_RiskSizing
  include_ablation_experiments: []
  export_individual_results: true
  export_charts: true
