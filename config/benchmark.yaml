# Unified benchmark configuration.
# - "main" mirrors config/config.yaml for engine settings (Phase 1/2 FullDAG vs standalone backtest).
#   Only "mode" must stay "backtest". Do not duplicate output_layout root/backtest/live here—those
#   come from config.yaml; under main.output_layout set only benchmark_subdir for the suite folder.
# - "phase1" compares full DAG, single-strategy runs, and baselines.
# - "phase2" runs DAG ablations (multi-interval, LLM portfolio, risk sizing).
#
# Report-oriented preset (FYP): ~14 calendar days, BTC-only, 1h+4h, two single-strategy controls,
# both simple baselines, charts on. Tweak dates/tickers if you need a shorter run or more realism.

main:
  # Phase runners require backtest even if config/config.yaml uses mode: live for day-to-day.
  mode: backtest

  # Keep dates / primary_interval / portfolio / signals / model / risk in lockstep with config.yaml.
  # Historical window (Binance klines): adjust if you need a different regime or length.
  start_date: 2025-11-01
  end_date: 2025-11-14

  primary_interval: 1h

  margin_requirement: 0.0

  sync_from_exchange: false

  initial_positions:
    cash: 50000
    positions:
      BTCUSDT:
        long: 0.1
        short: 0.0

  show_reasoning: false
  show_agent_graph: true

  print_frequency: 1
  use_progress_bar: true
  enable_logging: true
  save_decision_history: true

  output_layout:
    benchmark_subdir: benchmark

  auto_cleanup_files: false
  file_retention_days: 30
  file_keep_latest: 10

  risk:
    risk_per_trade_pct: 0.02
    stop_loss_pct: 0.05
    min_quantity: 0.001
    quantity_decimals: 3
    stop_distance_mode: entry_or_spot_pct
    atr_period: 14
    atr_multiplier: 1.0
    max_notional_fraction_per_ticker: 1.0

  signals:
    intervals: ["1h", "4h"]
    tickers: ["BTCUSDT"]
    strategies: ['MacdStrategy', 'RSIStrategy', 'BollingerStrategy']

  model:
    name: "deepseek-chat"
    provider: "openai"
    base_url: "https://api.deepseek.com/v1"
    temperature: 0.0
    format: "json"

phase1:
  # FullDAG (auto) vs two single-strategy DAGs (omit SingleBollinger to save runtime vs three singles).
  # Baselines: simple buy-and-hold and periodic equal-weight (same universe as tickers).

  run_buy_and_hold: true
  run_equal_weight_rebalance: true

  # Large value = less console spam (does not reduce LLM calls).
  dag_print_frequency: 999

  dag_use_progress_bar: true

  # Names: SingleMACD, SingleRSI, SingleBollinger
  include_dag_experiments: ["SingleMACD", "SingleRSI"]

  include_baseline_experiments: []

  # Per-experiment summary/equity CSV (in addition to combined suite files and charts).
  export_individual_results: true

  # If true, write comparison PNGs (equity overlays + total return bars) next to CSV outputs.
  export_charts: true

  # Rebalance frequency for EqualWeightRebalance baseline (in bars of primary_interval).
  # Example: primary_interval=1h and rebalance_every_bars=24 means rebalance daily.
  rebalance_every_bars: 24

phase2:
  # FullDAG (auto) vs all registered ablations (empty list = Ablate_MultiInterval, LLMPortfolio, RiskSizing).
  # Set include_ablation_experiments: ["Ablate_MultiInterval"] (etc.) for a faster partial suite.

  dag_print_frequency: 999
  dag_use_progress_bar: true

  run_buy_and_hold: false
  run_equal_weight_rebalance: false
  rebalance_every_bars: 24

  include_ablation_experiments: []

  include_baseline_experiments: []
  export_individual_results: true

  # Comparison charts (PNG) alongside combined CSVs.
  export_charts: true

