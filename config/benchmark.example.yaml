# Unified benchmark configuration example.
# Copy this file to benchmark.yaml and customize values.
# Tip: copy "main" from config/config.yaml (or config.example.yaml) so FullDAG matches your
# usual backtest; keep mode: backtest here (phase CLIs reject live).

main:
  mode: backtest

  start_date: 2025-01-01
  end_date: 2025-02-01

  primary_interval: 1h

  margin_requirement: 0.0

  sync_from_exchange: false

  initial_positions:
    cash: 100000
  #   positions:
  #     BTCUSDT:
  #       long: 0.1
  #       short: 0.0
  #     ETHUSDT:
  #       long: 2.0

  show_reasoning: false
  show_agent_graph: true

  print_frequency: 1
  use_progress_bar: true
  enable_logging: true
  save_decision_history: true

  auto_cleanup_files: false
  file_retention_days: 30
  file_keep_latest: 10

  # Same schema as config.example.yaml "risk" (optional; defaults apply if omitted).
  risk:
    risk_per_trade_pct: 0.02
    stop_loss_pct: 0.05
    min_quantity: 0.001
    quantity_decimals: 3
    stop_distance_mode: entry_or_spot_pct
    atr_period: 14
    atr_multiplier: 1.0
    max_notional_fraction_per_ticker: 1.0

  signals:
    intervals: ["1h", "4h"]
    tickers: ["BTCUSDT", "ETHUSDT"]
    strategies: ["MacdStrategy", "RSIStrategy", "BollingerStrategy"]

  model:
    # Change based on your provider/API keys.
    name: "gpt-4o-mini"
    provider: "openai"
    base_url: null
    temperature: 0.0
    format: "json"

phase1:
  # Edit paths, dates, and experiment lists before running.

  # Baseline toggles.
  run_buy_and_hold: true
  run_equal_weight_rebalance: true

  # List comparison DAG runs only (reference full DAG is auto-prepended; do not list FullDAG).
  # [] = reference plus all single-strategy variants.
  # DAG experiment output controls.
  # Legacy-style verbose output:
  # - print_frequency=1
  # - no tqdm overlay
  dag_print_frequency: 1
  dag_use_progress_bar: false

  # Leave empty to run all groups, or specify selected names.
  include_dag_experiments: []
  include_baseline_experiments: []

  # Per-experiment CSV files plus combined suite outputs (recommended for experiment workflows).
  export_individual_results: true

  # Write equity overlay and total-return PNGs next to benchmark CSVs.
  export_charts: true

  # Rebalance cadence for EqualWeightRebalance baseline.
  rebalance_every_bars: 24

  # Output directory for benchmark csv files.
  output_dir: "output"

phase2:
  # [] = reference plus all ablations. Non-empty = only those Ablate_* names (FullDAG auto-prepended).
  # Ablation benchmark (full DAG vs removing one subsystem at a time).
  dag_print_frequency: 1
  dag_use_progress_bar: false
  run_buy_and_hold: false
  run_equal_weight_rebalance: false
  rebalance_every_bars: 24
  # Ablate_MultiInterval, Ablate_LLMPortfolio, Ablate_RiskSizing
  include_ablation_experiments: []
  include_baseline_experiments: []
  export_individual_results: true
  export_charts: true
  output_dir: "output"

