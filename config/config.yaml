# Configuration File
mode: live  # Trading mode: "backtest" or "live"

# Date range for backtesting (only used in backtest mode)
start_date: 2026-01-01
end_date: 2026-01-02

# Primary time interval for decision making
# Note: This interval will be automatically added to signals.intervals if not already present
primary_interval: 1h

# Margin requirement for short positions (0.0 = no margin)
margin_requirement: 0.0

# Portfolio initialization (works for both live and backtest modes)
# Option 1: Sync from exchange (live mode only, requires BINANCE_API_KEY and BINANCE_API_SECRET)
sync_from_exchange: false  # Set to true to sync portfolio from Binance account

# Option 2: Manual initial positions (works for both live and backtest modes)
# Starting cash is set here (single source; legacy top-level initial_cash is still supported for old configs).
# Note: Cost basis is automatically set using historical/real-time prices
# - Backtest mode: Uses price at start_date
# - Live mode: Uses current market price
# This ensures accurate evaluation of trading framework performance
initial_positions:
  cash: 50000
  positions:
    BTCUSDT:
      long: 0.1  # Long position quantity
      short: 0.0  # Short position quantity
    ETHUSDT:
      long: 20

# Display options
show_reasoning: false  # Show LLM reasoning process
show_agent_graph: true  # Generate and save workflow graph

# Performance and output options
print_frequency: 1  # Print results every N iterations
use_progress_bar: true  # Show progress bar during backtest
enable_logging: true  # Generate log files in output/ directory
save_decision_history: true  # Save decision history to JSON file

# File management options
auto_cleanup_files: false  # Automatically clean up old files
file_retention_days: 30  # Delete files older than N days
file_keep_latest: 10  # Always keep at least N latest files

# Signal generation configuration
signals:
  # Time intervals to analyze (primary_interval will be automatically included if not listed)
  intervals: ["1h", "4h"]
  tickers: ["BTCUSDT", "ETHUSDT"]  # Trading pairs to analyze
  strategies: ['MacdStrategy', 'RSIStrategy', 'BollingerStrategy']  # Trading strategies to use

# LLM model configuration
model:
  name: "deepseek-chat"  # Model name (DeepSeek: "deepseek-chat" or "deepseek-chat-32k")
  provider: "openai"  # LLM provider (DeepSeek uses "openai" with custom base_url)
  base_url: "https://api.deepseek.com/v1"  # API base URL (for DeepSeek)
  temperature: 0.0  # Model temperature (0.0 = deterministic)
  format: "json"  # Response format (only JSON is supported)
