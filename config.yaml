# Configuration File
# This is the main configuration file for the trading system
# See config.example.yaml for detailed explanations

# Trading mode: "backtest" or "live"
mode: backtest

# Date range for backtesting (only used in backtest mode)
start_date: 2025-01-01
end_date: 2025-01-02

# Primary time interval for decision making
# Must be one of the intervals listed in signals.intervals
primary_interval: 4h

# Initial capital for trading
initial_cash: 100000

# Margin requirement for short positions (0.0 = no margin)
margin_requirement: 0.0

# Display options
show_reasoning: false  # Show LLM reasoning process
show_agent_graph: true  # Generate and save workflow graph

# Performance and output options
# Backtest mode options
print_frequency: 1        # Print results every N iterations (default: 1 = every iteration)
use_progress_bar: true    # Show progress bar during backtest (default: true)
enable_logging: true      # Generate log files in output/ directory (default: true)

# Live mode options
save_decision_history: true  # Save decision history to JSON file (default: true)

# File management options
auto_cleanup_files: false     # Automatically clean up old files (default: false)
file_retention_days: 30      # Delete files older than N days (default: 30)
file_keep_latest: 10         # Always keep at least N latest files (default: 10)

# Signal generation configuration
signals:
  # Time intervals to analyze (can use multiple)
  intervals: ["1h", "4h"]
  
  # Trading pairs to analyze
  tickers: ["BTCUSDT", "ETHUSDT"]
  
  # Trading strategies to use
  strategies: ['MacdStrategy', 'RSIStrategy', 'BollingerStrategy']

# LLM model configuration
model:
  # Model name (varies by provider): "deepseek-chat", "gemini-2.5-flash", "groq/llama-3.1-70b-versatile"
  name: "deepseek-chat"
  
  # LLM provider: "openai", "groq", "openrouter", "gemini", "anthropic", "ollama"
  provider: "openai"
  
  # Base URL for API (optional, uses default if not specified)
  base_url: "https://api.deepseek.com/v1"
  
  # Temperature for model responses (0.0 = deterministic)
  temperature: 0.0
  
  # Response format: "json" or "text"
  format: "json"
